[project]
name = "metricguard"
version = "0.1.0"
description = "Semantic Conflict Intelligence for DataHub — finds where the same business metric is computed with conflicting logic, proves the disagreement, and guards against drift."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "sqlglot>=25.0",
    "langchain>=0.3",
    "langchain-anthropic>=0.3",
    "langchain-mcp-adapters>=0.1",
    "typer>=0.12",
    "rich>=13.0",
    "pydantic>=2.7",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
# Install the Postgres executor for live numeric divergence:
#   uv sync --extra warehouse
warehouse = ["psycopg[binary]>=3.1"]
# Additional LLM providers, if we swap away from Anthropic:
openai = ["langchain-openai>=0.2"]
google = ["langchain-google-genai>=2.0"]

[dependency-groups]
dev = ["pytest>=8.0", "ruff>=0.5"]

[project.scripts]
metricguard = "metricguard.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metricguard"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
